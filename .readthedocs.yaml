version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      - echo "准备构建文档..."
    build:
      html:
        - sphinx-build -b html -d _build/doctrees docs/source/ $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - requirements: docs/requirements.txt   # 如果不需要，可以删除这4行
